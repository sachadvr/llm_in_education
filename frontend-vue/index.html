<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ALAO — Apprentissage des Langues par LLM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #14110F;
        --bg-card: rgba(255,255,255,0.05);
        --bg-card-hover: rgba(255,255,255,0.08);
        --border: rgba(255,255,255,0.1);
        --border-hover: rgba(255,255,255,0.2);
        --text: rgba(255,255,255,0.9);
        --text-dim: rgba(255,255,255,0.5);
        --text-dim2: rgba(255,255,255,0.35);
        --accent: #2DD4BF;
        --accent-dim: rgba(45,212,191,0.15);
        --warm: #FB923C;
        --warm-dim: rgba(251,146,60,0.15);
        --success: #4ADE80;
        --success-dim: rgba(74,222,128,0.12);
        --danger: #F87171;
        --pipeline: #818CF8;
        --pipeline-dim: rgba(129,140,248,0.15);
      }
      * { box-sizing: border-box; }
      html { font-family: 'Inter', system-ui, sans-serif; }
      body { background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
      .font-mono { font-family: 'IBM Plex Mono', monospace; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
